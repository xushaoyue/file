app:
  name: "Source Code Audit System"
  version: "1.0.0"
  host: "0.0.0.0"
  port: 8000
  debug: false
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
  timezone: "Asia/Shanghai"

database:
  type: "sqlite"
  path: "./data/audit.db"
  echo: false
  pool_size: 10
  max_overflow: 20

security:
  secret_key: "your-secret-key-change-in-production-use-openssl-rand-base64-32"
  algorithm: "HS256"
  access_token_expire_minutes: 30
  refresh_token_expire_days: 7
  bcrypt_cost_factor: 12
  max_login_attempts: 5
  lockout_duration_minutes: 15

monitor:
  enabled: true
  watch_paths:
    - "/source"
    - "D:/Project/SourceCode"
  exclude_paths:
    - "*/.git/*"
    - "*/node_modules/*"
    - "*/__pycache__/*"
    - "*/bin/*"
    - "*/obj/*"
  exclude_extensions:
    - ".pyc"
    - ".class"
    - ".o"
    - ".exe"
  mode: "recursive"
  capture_diff: true
  diff_context_lines: 3
  batch_size: 100
  batch_timeout_seconds: 5

rate_limit:
  enabled: true
  per_minute: 60

log:
  level: "INFO"
  dir: "./logs/audit"
  retention_days: 365
  format: "json"
  app_log_file: "app.log"
  audit_log_prefix: "audit"

audit:
  # 日志记录级别: minimal(仅记录关键操作), standard(标准记录), verbose(详细记录)
  log_level: "standard"
  # 批量操作阈值，超过此数量的文件操作将合并为一条聚合日志
  batch_operation_threshold: 10
  # 是否记录文件列表操作（list）的日志
  log_list_operations: false
  # 是否记录文件读取操作（read）的日志
  log_read_operations: true
  # 是否启用批量日志合并
  enable_batch_logging: true

file_access:
  base_path: "D:/PROJECT/SourceCode"
  max_file_size_mb: 100
  allowed_encodings:
    - "utf-8"
    - "gbk"
    - "gb2312"
  preview_lines: 1000

admin:
  default_username: "admin"
  default_password: "Admin@123456"
  must_change_password: true
